<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar fotos — Trek 696534484</title>
<style>
body{font-family:Arial,sans-serif;background:#0d0f12;color:#e2e6f0;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:18px;margin-bottom:12px}
.btn{background:#f5a623;color:#000;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.log{background:#181c23;border:1px solid #1e232d;border-radius:8px;padding:14px;margin-top:14px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:600px;overflow-y:auto}
.row{margin-bottom:6px}
.ok{color:#2dd4a0}
.warn{color:#f5a623}
.err{color:#f87171}
.thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #2d3340;margin:4px;cursor:pointer}
</style>
</head>
<body>
<h1>🔧 Recuperar fotos — Trek (PO 696534484)</h1>
<p style="font-size:13px;color:#7d8799">Esto busca el pedido Trek con PO 696534484, encuentra las fotos asociadas en Supabase Storage, y las re-asocia al registro de la orden para que vuelvan a aparecer en el iPad.</p>

<button class="btn" id="btn-scan" onclick="escanear()">1. Escanear fotos en Storage</button>
<button class="btn" id="btn-fix" onclick="aplicar()" disabled>2. Re-asociar fotos a la orden</button>

<div class="log" id="log">Listo para escanear...</div>

<script>
const SB_URL='https://ozibjgsxyzdbporcarwv.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96aWJqZ3N4eXpkYnBvcmNhcnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTc5MjEsImV4cCI6MjA5Mjk3MzkyMX0.mO77vLN92En0fvn1U-FFif43CsCG_QMiVKSclBCL7-M';
const SB_H={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};
const PO_OBJETIVO='696534484';
const log=document.getElementById('log');
let datos={pipeline:null,orden:null,fotos:[]};

function add(msg,cls){const d=document.createElement('div');d.className='row '+(cls||'');d.innerHTML=msg;log.appendChild(d);log.scrollTop=log.scrollHeight;}

async function escanear(){
  document.getElementById('btn-scan').disabled=true;
  log.innerHTML='';
  try{
    add('Buscando pedido con PO '+PO_OBJETIVO+'...');
    const rPipe=await fetch(SB_URL+'/rest/v1/pipeline_mf?po=eq.'+PO_OBJETIVO+'&select=id,sub_cliente,cliente,po,estado,pdf_diseno_url',{headers:SB_H});
    const pipes=await rPipe.json();
    if(!pipes||!pipes.length){add('✗ No se encontró pedido con esa PO','err');return;}
    if(pipes.length>1)add('⚠ Hay '+pipes.length+' pedidos con esa PO, usando el primero','warn');
    datos.pipeline=pipes[0];
    add('✓ Pedido encontrado: '+(datos.pipeline.sub_cliente||datos.pipeline.cliente)+' · estado '+datos.pipeline.estado,'ok');
    add('  pipeline_id: '+datos.pipeline.id);
    add('');

    add('Buscando orden de producción...');
    const rOrd=await fetch(SB_URL+'/rest/v1/ordenes_produccion?pipeline_id=eq.'+datos.pipeline.id+'&order=created_at.desc&limit=1&select=*',{headers:SB_H});
    const ords=await rOrd.json();
    if(!ords||!ords.length){add('✗ No hay registro de orden_produccion para este pedido','err');return;}
    datos.orden=ords[0];
    const fActuales=Array.isArray(datos.orden.foto_urls)?datos.orden.foto_urls.filter(Boolean).length:0;
    add('✓ Orden encontrada: id '+datos.orden.id,'ok');
    add('  fotos actualmente registradas en orden: '+fActuales);
    add('');

    add('Listando archivos en Storage para orden '+datos.orden.id+'...');
    const rF=await fetch(SB_URL+'/storage/v1/object/list/fotos-aprobacion',{
      method:'POST',
      headers:SB_H,
      body:JSON.stringify({prefix:datos.orden.id+'/',limit:50,sortBy:{column:'name',order:'asc'}})
    });
    const files=await rF.json();
    if(!Array.isArray(files)||!files.length){
      add('✗ No hay fotos en Storage para esta orden','err');
      add('  ¿Estás seguro que se subieron correctamente? Revisa Supabase → Storage → fotos-aprobacion','warn');
      return;
    }
    add('✓ Archivos encontrados: '+files.length,'ok');

    // Reconstruir 4 slots tomando la foto más reciente por posición (0-3)
    const fotos=[null,null,null,null];
    files.sort((a,b)=>b.name.localeCompare(a.name)); // más recientes primero (timestamp en nombre)
    files.forEach(f=>{
      const m=f.name.match(/foto-(\d)-/);
      if(m){
        const pos=parseInt(m[1]);
        if(pos>=0&&pos<=3&&!fotos[pos]){
          fotos[pos]=SB_URL+'/storage/v1/object/public/fotos-aprobacion/'+datos.orden.id+'/'+f.name;
        }
      }
    });
    datos.fotos=fotos;

    const fotosOk=fotos.filter(Boolean).length;
    add('  fotos asignadas a slots (0-3): '+fotosOk+' de 4');
    if(fotosOk===0){add('✗ Ningún archivo siguió el patrón foto-N-... — abortar','err');return;}

    // Mostrar thumbnails
    add('');
    add('<strong>Vista previa:</strong>');
    let thumbsRow=document.createElement('div');
    thumbsRow.className='row';
    thumbsRow.innerHTML='';
    fotos.forEach((url,i)=>{
      if(url){
        thumbsRow.innerHTML+='<a href="'+url+'" target="_blank"><img src="'+url+'" class="thumb" title="Slot '+i+'"></a>';
      }else{
        thumbsRow.innerHTML+='<span class="thumb" style="display:inline-flex;align-items:center;justify-content:center;color:#666">slot '+i+'<br>vacío</span>';
      }
    });
    log.appendChild(thumbsRow);

    add('');
    add('Click en "Re-asociar fotos a la orden" para guardar estos URLs en orden_produccion.foto_urls','warn');
    document.getElementById('btn-fix').disabled=false;
  }catch(e){
    add('Error: '+e.message,'err');
    document.getElementById('btn-scan').disabled=false;
  }
}

async function aplicar(){
  if(!datos.orden||!datos.fotos.length){add('Primero escanea','err');return;}
  if(!confirm('Esto va a reescribir foto_urls de la orden con las URLs encontradas. ¿Continuar?'))return;
  document.getElementById('btn-fix').disabled=true;
  add('');
  add('Aplicando PATCH a ordenes_produccion...');
  try{
    const fotosFiltered=datos.fotos.filter(u=>u&&typeof u==='string'&&u.startsWith('http'));
    const r=await fetch(SB_URL+'/rest/v1/ordenes_produccion?id=eq.'+datos.orden.id,{
      method:'PATCH',
      headers:{...SB_H,'Prefer':'return=minimal'},
      body:JSON.stringify({foto_urls:fotosFiltered})
    });
    if(!r.ok){
      const txt=await r.text();
      add('✗ HTTP '+r.status+': '+txt.substring(0,200),'err');
      return;
    }
    add('✓ Fotos re-asociadas correctamente — '+fotosFiltered.length+' URLs guardadas','ok');
    add('');
    add('Ahora hard refresh en el iPad y entra al pedido Trek — las fotos deben aparecer en sus slots.','ok');
  }catch(e){
    add('Error: '+e.message,'err');
  }
}
</script>
</body>
</html>
